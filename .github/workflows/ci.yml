name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: CLI smoke test
        run: |
          node ./bin/agentlens.js init
          node ./bin/agentlens.js demo --out .agentlens/runs/demo.json
          node ./bin/agentlens.js inspect .agentlens/runs/demo.json
          node ./bin/agentlens.js replay .agentlens/runs/demo.json
          node ./bin/agentlens.js eval .agentlens/runs/demo.json --config evals/default.json
          node ./bin/agentlens.js schema trace
          node ./bin/agentlens.js schema eval
          node ./bin/agentlens.js schema review
          node ./bin/agentlens.js redact .agentlens/runs/demo.json --out .agentlens/runs/demo.redacted.json
          node ./bin/agentlens.js ci --runs .agentlens/runs --config evals/default.json
          node ./bin/agentlens.js dashboard .agentlens/runs/demo.json --out .agentlens/reports/demo.html
          timeout 5s node ./bin/agentlens.js serve .agentlens/runs --port 4317 || test $? -eq 124

      - name: Generate review smoke traces
        run: npm run demo:regression-pr

      - name: GitHub Action smoke test
        id: agentlens-action
        uses: ./
        with:
          runs: .agentlens/runs
          config: evals/default.json
          summary: false
          pr-comment: .agentlens/reports/pr-comment.md
          bundle: .agentlens/reports/action-bundle
          bundle-sections: summary,scan,tool-calls,workflow,timeline
          review-baseline: .agentlens/regression-pr/runs/baseline.json
          review-candidate: .agentlens/regression-pr/runs/candidate.json
          review: .agentlens/reports/action-review
          review-sections: summary,scan,tool-calls,workflow,timeline

      - name: Verify GitHub Action outputs
        shell: bash
        run: |
          test "${{ steps.agentlens-action.outputs.status }}" = "PASS"
          test "${{ steps.agentlens-action.outputs.failed }}" = "0"
          test "${{ steps.agentlens-action.outputs.total }}" != "0"
          test "${{ steps.agentlens-action.outputs.bundle }}" = ".agentlens/reports/action-bundle"
          test "${{ steps.agentlens-action.outputs.bundle-manifest }}" = ".agentlens/reports/action-bundle/manifest.json"
          test "${{ steps.agentlens-action.outputs.review }}" = ".agentlens/reports/action-review"
          test "${{ steps.agentlens-action.outputs.review-pr-comment }}" = ".agentlens/reports/action-review/reports/pr-comment.md"
          test "${{ steps.agentlens-action.outputs.review-bundle }}" = ".agentlens/reports/action-review/reports/bundle"
          test "${{ steps.agentlens-action.outputs.review-bundle-manifest }}" = ".agentlens/reports/action-review/reports/bundle/manifest.json"
          test "${{ steps.agentlens-action.outputs.review-manifest }}" = ".agentlens/reports/action-review/review.json"
          test "${{ steps.agentlens-action.outputs.review-workflow-chains }}" = "2"
          test "${{ steps.agentlens-action.outputs.review-workflow-tasks }}" = "0"
          test "${{ steps.agentlens-action.outputs.review-workflow-errors }}" = "2"
          test "${{ steps.agentlens-action.outputs.review-workflow-chain-delta }}" = "0"
          test "${{ steps.agentlens-action.outputs.review-workflow-task-delta }}" = "-2"
          test "${{ steps.agentlens-action.outputs.review-workflow-error-delta }}" = "2"
          test "${{ steps.agentlens-action.outputs.review-workflow-regressions }}" = "2"
          grep -q "agentlens-ci-comment" .agentlens/reports/pr-comment.md
          test -f .agentlens/reports/action-bundle/index.html
          test -f .agentlens/reports/action-bundle/manifest.json
          grep -q "agentlens.run-bundle.v1" .agentlens/reports/action-bundle/manifest.json
          grep -q "agentlens-ci-comment" .agentlens/reports/action-review/reports/pr-comment.md
          test -f .agentlens/reports/action-review/reports/diff.html
          test -f .agentlens/reports/action-review/reports/bundle/index.html
          test -f .agentlens/reports/action-review/reports/bundle/manifest.json
          test -f .agentlens/reports/action-review/review.json
          grep -q "agentlens.review.v1" .agentlens/reports/action-review/review.json
          node ./bin/agentlens.js validate review .agentlens/reports/action-review/review.json

      - name: MCP adapter demo
        run: |
          npm run demo:mcp
          node ./bin/agentlens.js eval .agentlens/runs/mcp-demo.json --config evals/default.json
          node ./bin/agentlens.js eval .agentlens/runs/mcp-demo.json --config evals/mcp-policy.json
          npm run demo:mcp:stdio
          node ./bin/agentlens.js eval .agentlens/runs/mcp-stdio-demo.json --config evals/mcp-policy.json

      - name: LLM wrapper demo
        run: |
          npm run demo:llm
          node ./bin/agentlens.js eval .agentlens/runs/llm-wrapper-demo.json --config evals/llm-basic.json

      - name: Python trace writer demo
        run: npm run demo:python

      - name: Python framework cookbook demo
        run: npm run demo:python:frameworks

      - name: Multi-agent demo
        run: |
          npm run demo:autogen
          node ./bin/agentlens.js eval .agentlens/runs/autogen-style-demo.json --config evals/multi-agent-basic.json
          npm run demo:crewai
          node ./bin/agentlens.js eval .agentlens/runs/crewai-style-demo.json --config evals/multi-agent-basic.json

      - name: Regression PR demo
        run: npm run demo:regression-pr

      - name: JSONL streaming demo
        run: |
          npm run demo:jsonl
          node ./bin/agentlens.js materialize .agentlens/runs/jsonl-demo.jsonl --out .agentlens/runs/jsonl-demo.cli.json
          node ./bin/agentlens.js eval .agentlens/runs/jsonl-demo.cli.json --config evals/default.json

      - name: Launch demo artifacts
        run: npm run launch:demo

      - name: Failure demo catches policy violations
        shell: bash
        run: |
          npm run demo:fail
          if node ./bin/agentlens.js eval .agentlens/runs/failing-demo.json --config evals/default.json; then
            echo "Expected failing demo eval to fail"
            exit 1
          fi
