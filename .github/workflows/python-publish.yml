name: publish-python

on:
  workflow_dispatch:
    inputs:
      target:
        description: Python package index to publish to.
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify package source path
        run: npm run python:package

      - name: Verify installed package path
        run: npm run python:publish:check

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package distributions
        run: python -m build
        working-directory: python/agentlens-trace

      - name: Check package distributions
        run: python -m twine check --strict dist/*
        working-directory: python/agentlens-trace

      - name: Upload package distributions
        uses: actions/upload-artifact@v4
        with:
          name: agentlens-trace-dist
          path: python/agentlens-trace/dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v5
        with:
          name: agentlens-trace-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v5
        with:
          name: agentlens-trace-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
