name: Bug report
description: Report a reproducible AgentLens bug.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not attach traces that contain secrets, private prompts, customer data, or credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: AgentLens failed to...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands or minimal code needed to reproduce the issue.
      render: bash
      placeholder: |
        node ./bin/agentlens.js demo --out .agentlens/runs/demo.json
        node ./bin/agentlens.js eval .agentlens/runs/demo.json --config evals/default.json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include CLI output when useful.
      render: text
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "node --version"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS, Linux, Windows"
    validations:
      required: false
