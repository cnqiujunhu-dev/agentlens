name: AgentLens CI
description: Run AgentLens evals against recorded AI agent traces.

inputs:
  runs:
    description: Directory containing AgentLens trace JSON files.
    required: false
    default: .agentlens/runs
  config:
    description: AgentLens eval config JSON file.
    required: false
    default: evals/default.json
  node-version:
    description: Node.js version used to run AgentLens.
    required: false
    default: "20"
  summary:
    description: Write a Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run AgentLens CI
      shell: bash
      run: |
        args=(ci --runs "${{ inputs.runs }}" --config "${{ inputs.config }}")
        if [[ "${{ inputs.summary }}" == "true" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          args+=(--summary-md "$GITHUB_STEP_SUMMARY")
        fi
        node "$GITHUB_ACTION_PATH/bin/agentlens.js" "${args[@]}"
