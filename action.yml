name: AgentLens CI
description: Run AgentLens evals and optional scans against recorded AI agent traces.

inputs:
  runs:
    description: Directory containing AgentLens trace JSON files.
    required: false
    default: .agentlens/runs
  config:
    description: AgentLens eval config JSON file.
    required: false
    default: evals/default.json
  node-version:
    description: Node.js version used to run AgentLens.
    required: false
    default: "22"
  summary:
    description: Write a Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"
  pr-comment:
    description: Optional path to write Markdown suitable for a GitHub PR comment.
    required: false
    default: ""
  artifact-url:
    description: Optional uploaded run bundle or review pack URL to include in generated PR comments and review manifests.
    required: false
    default: ""
  sarif-url:
    description: Optional uploaded SARIF or code scanning URL to include in generated PR comments and review manifests.
    required: false
    default: ""
  bundle:
    description: Optional directory to write a static AgentLens run bundle.
    required: false
    default: ""
  bundle-sections:
    description: Optional dashboard sections for the generated run bundle.
    required: false
    default: summary,scan,tool-calls,workflow,filters,timeline
  review-baseline:
    description: Optional baseline trace file for a before/after AgentLens review pack.
    required: false
    default: ""
  review-candidate:
    description: Optional candidate trace file for a before/after AgentLens review pack.
    required: false
    default: ""
  review:
    description: Optional directory to write an AgentLens review pack for review-baseline and review-candidate.
    required: false
    default: ""
  review-sections:
    description: Optional dashboard sections for the generated review pack run bundle.
    required: false
    default: summary,scan,tool-calls,workflow,filters,timeline
  review-fail-on-failure:
    description: Fail the action when the generated review pack reports failing eval or scan gates.
    required: false
    default: "false"
  scan:
    description: Run AgentLens security scan after evals.
    required: false
    default: "true"
  scan-fail-on:
    description: Lowest scan severity that fails the action.
    required: false
    default: high
  sarif:
    description: Optional path to write combined SARIF scan results. Requires scan to be true.
    required: false
    default: ""

outputs:
  status:
    description: PASS when all traces pass evals and scans and at least one trace is found; otherwise FAIL.
    value: ${{ steps.agentlens.outputs.status }}
  total:
    description: Number of trace files evaluated.
    value: ${{ steps.agentlens.outputs.total }}
  passed:
    description: Number of trace files that passed.
    value: ${{ steps.agentlens.outputs.passed }}
  failed:
    description: Number of trace files that failed.
    value: ${{ steps.agentlens.outputs.failed }}
  bundle:
    description: Directory containing the generated run bundle when the bundle input is set.
    value: ${{ steps.agentlens.outputs.bundle }}
  bundle-manifest:
    description: Path to the generated run bundle manifest when the bundle input is set.
    value: ${{ steps.agentlens.outputs.bundle-manifest }}
  review:
    description: Directory containing the generated review pack when review inputs are set.
    value: ${{ steps.agentlens.outputs.review }}
  review-pr-comment:
    description: Path to the generated review PR comment Markdown when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-pr-comment }}
  review-bundle:
    description: Directory containing the generated review run bundle when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-bundle }}
  review-bundle-manifest:
    description: Path to the generated review run bundle manifest when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-bundle-manifest }}
  review-manifest:
    description: Path to the generated review pack manifest when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-manifest }}
  review-status:
    description: PASS when the generated review pack passed eval and scan gates; otherwise FAIL.
    value: ${{ steps.agentlens.outputs.review-status }}
  review-generated-at:
    description: ISO timestamp recorded in the generated review manifest.
    value: ${{ steps.agentlens.outputs.review-generated-at }}
  review-artifact-url:
    description: Artifact URL recorded in the generated review manifest when artifact-url is set.
    value: ${{ steps.agentlens.outputs.review-artifact-url }}
  review-sarif-url:
    description: SARIF URL recorded in the generated review manifest when sarif-url is set.
    value: ${{ steps.agentlens.outputs.review-sarif-url }}
  review-workflow-chains:
    description: Candidate chain event count from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-chains }}
  review-workflow-tasks:
    description: Candidate task event count from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-tasks }}
  review-workflow-errors:
    description: Candidate workflow error marker count from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-errors }}
  review-workflow-chain-delta:
    description: Candidate minus baseline chain event delta from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-chain-delta }}
  review-workflow-task-delta:
    description: Candidate minus baseline task event delta from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-task-delta }}
  review-workflow-error-delta:
    description: Candidate minus baseline workflow error marker delta from the review diff when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-error-delta }}
  review-workflow-regressions:
    description: Count of workflow regressions detected from chain, task, and workflow error deltas when review inputs are set.
    value: ${{ steps.agentlens.outputs.review-workflow-regressions }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run AgentLens CI
      id: agentlens
      shell: bash
      run: |
        report_json="$(mktemp)"
        args=(ci --runs "${{ inputs.runs }}" --config "${{ inputs.config }}" --json)
        if [[ "${{ inputs.scan }}" == "true" ]]; then
          args+=(--scan --scan-fail-on "${{ inputs.scan-fail-on }}")
        fi
        if [[ -n "${{ inputs.sarif }}" ]]; then
          args+=(--sarif "${{ inputs.sarif }}")
        fi
        if [[ "${{ inputs.summary }}" == "true" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          args+=(--summary-md "$GITHUB_STEP_SUMMARY")
        fi
        if [[ -n "${{ inputs.pr-comment }}" ]]; then
          args+=(--pr-comment-md "${{ inputs.pr-comment }}")
        fi
        if [[ -n "${{ inputs.artifact-url }}" ]]; then
          args+=(--artifact-url "${{ inputs.artifact-url }}")
        fi
        if [[ -n "${{ inputs.sarif-url }}" ]]; then
          args+=(--sarif-url "${{ inputs.sarif-url }}")
        fi
        set +e
        node "$GITHUB_ACTION_PATH/bin/agentlens.js" "${args[@]}" > "$report_json"
        exit_code=$?
        set -e
        cat "$report_json"
        node - "$report_json" <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("node:fs");
        const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
        const status = report.failed === 0 && report.total > 0 ? "PASS" : "FAIL";
        console.log(`status=${status}`);
        console.log(`total=${report.total}`);
        console.log(`passed=${report.passed}`);
        console.log(`failed=${report.failed}`);
        NODE
        bundle_dir="${{ inputs.bundle }}"
        if [[ -n "$bundle_dir" ]]; then
          bundle_args=(bundle "${{ inputs.runs }}" --out "$bundle_dir")
          if [[ -n "${{ inputs.bundle-sections }}" ]]; then
            bundle_args+=(--sections "${{ inputs.bundle-sections }}")
          fi
          node "$GITHUB_ACTION_PATH/bin/agentlens.js" "${bundle_args[@]}"
          {
            echo "bundle=$bundle_dir"
            echo "bundle-manifest=$bundle_dir/manifest.json"
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo "bundle="
            echo "bundle-manifest="
          } >> "$GITHUB_OUTPUT"
        fi
        review_baseline="${{ inputs.review-baseline }}"
        review_candidate="${{ inputs.review-candidate }}"
        review_dir="${{ inputs.review }}"
        if [[ -n "$review_baseline" || -n "$review_candidate" || -n "$review_dir" ]]; then
          if [[ -z "$review_baseline" || -z "$review_candidate" || -z "$review_dir" ]]; then
            echo "review-baseline, review-candidate, and review must be provided together" >&2
            exit_code=1
          else
            review_args=(review "$review_baseline" "$review_candidate" --config "${{ inputs.config }}" --out "$review_dir")
            if [[ "${{ inputs.scan }}" == "true" ]]; then
              review_args+=(--scan-fail-on "${{ inputs.scan-fail-on }}")
            else
              review_args+=(--no-scan)
            fi
            if [[ -n "${{ inputs.review-sections }}" ]]; then
              review_args+=(--sections "${{ inputs.review-sections }}")
            fi
            if [[ -n "${{ inputs.artifact-url }}" ]]; then
              review_args+=(--artifact-url "${{ inputs.artifact-url }}")
            fi
            if [[ -n "${{ inputs.sarif-url }}" ]]; then
              review_args+=(--sarif-url "${{ inputs.sarif-url }}")
            fi
            if [[ "${{ inputs.review-fail-on-failure }}" == "true" ]]; then
              review_args+=(--fail-on-failure)
            fi
            set +e
            node "$GITHUB_ACTION_PATH/bin/agentlens.js" "${review_args[@]}"
            review_exit_code=$?
            set -e
            if [[ "$review_exit_code" -ne 0 ]]; then
              exit_code="$review_exit_code"
            fi
            {
              echo "review=$review_dir"
              echo "review-pr-comment=$review_dir/reports/pr-comment.md"
              echo "review-bundle=$review_dir/reports/bundle"
              echo "review-bundle-manifest=$review_dir/reports/bundle/manifest.json"
              echo "review-manifest=$review_dir/review.json"
            } >> "$GITHUB_OUTPUT"
            node - "$review_dir/review.json" <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("node:fs");
        const manifest = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
        console.log(`review-status=${manifest.status?.passed ? "PASS" : "FAIL"}`);
        console.log(`review-generated-at=${manifest.generatedAt ?? ""}`);
        console.log(`review-artifact-url=${manifest.links?.artifactUrl ?? ""}`);
        console.log(`review-sarif-url=${manifest.links?.sarifUrl ?? ""}`);
        NODE
            review_diff_json="$(mktemp)"
            set +e
            node "$GITHUB_ACTION_PATH/bin/agentlens.js" diff "$review_baseline" "$review_candidate" --json > "$review_diff_json"
            review_diff_exit_code=$?
            set -e
            if [[ "$review_diff_exit_code" -ne 0 ]]; then
              exit_code="$review_diff_exit_code"
              {
                echo "review-workflow-chains="
                echo "review-workflow-tasks="
                echo "review-workflow-errors="
                echo "review-workflow-chain-delta="
                echo "review-workflow-task-delta="
                echo "review-workflow-error-delta="
                echo "review-workflow-regressions="
              } >> "$GITHUB_OUTPUT"
            else
              node - "$review_diff_json" <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("node:fs");
        const diff = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
        const rows = Object.fromEntries((diff.workflow ?? []).map((row) => [row.name, row]));
        const chains = rows["Chain events"] ?? {};
        const tasks = rows["Task events"] ?? {};
        const errors = rows["Workflow errors"] ?? {};
        const value = (item, key) => item[key] ?? "";
        const workflowRegressions = Number((chains.delta ?? 0) < 0) + Number((tasks.delta ?? 0) < 0) + Number((errors.delta ?? 0) > 0);
        console.log(`review-workflow-chains=${value(chains, "candidate")}`);
        console.log(`review-workflow-tasks=${value(tasks, "candidate")}`);
        console.log(`review-workflow-errors=${value(errors, "candidate")}`);
        console.log(`review-workflow-chain-delta=${value(chains, "delta")}`);
        console.log(`review-workflow-task-delta=${value(tasks, "delta")}`);
        console.log(`review-workflow-error-delta=${value(errors, "delta")}`);
        console.log(`review-workflow-regressions=${workflowRegressions}`);
        NODE
            fi
          fi
        else
          {
            echo "review="
            echo "review-pr-comment="
            echo "review-bundle="
            echo "review-bundle-manifest="
            echo "review-manifest="
            echo "review-status="
            echo "review-generated-at="
            echo "review-artifact-url="
            echo "review-sarif-url="
            echo "review-workflow-chains="
            echo "review-workflow-tasks="
            echo "review-workflow-errors="
            echo "review-workflow-chain-delta="
            echo "review-workflow-task-delta="
            echo "review-workflow-error-delta="
            echo "review-workflow-regressions="
          } >> "$GITHUB_OUTPUT"
        fi
        exit "$exit_code"
