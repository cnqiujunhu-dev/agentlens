name: AgentLens CI
description: Run AgentLens evals and optional scans against recorded AI agent traces.

inputs:
  runs:
    description: Directory containing AgentLens trace JSON files.
    required: false
    default: .agentlens/runs
  config:
    description: AgentLens eval config JSON file.
    required: false
    default: evals/default.json
  node-version:
    description: Node.js version used to run AgentLens.
    required: false
    default: "20"
  summary:
    description: Write a Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"
  scan:
    description: Run AgentLens security scan after evals.
    required: false
    default: "true"
  scan-fail-on:
    description: Lowest scan severity that fails the action.
    required: false
    default: high

outputs:
  status:
    description: PASS when all traces pass evals and scans and at least one trace is found; otherwise FAIL.
    value: ${{ steps.agentlens.outputs.status }}
  total:
    description: Number of trace files evaluated.
    value: ${{ steps.agentlens.outputs.total }}
  passed:
    description: Number of trace files that passed.
    value: ${{ steps.agentlens.outputs.passed }}
  failed:
    description: Number of trace files that failed.
    value: ${{ steps.agentlens.outputs.failed }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run AgentLens CI
      id: agentlens
      shell: bash
      run: |
        report_json="$(mktemp)"
        args=(ci --runs "${{ inputs.runs }}" --config "${{ inputs.config }}" --json)
        if [[ "${{ inputs.scan }}" == "true" ]]; then
          args+=(--scan --scan-fail-on "${{ inputs.scan-fail-on }}")
        fi
        if [[ "${{ inputs.summary }}" == "true" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          args+=(--summary-md "$GITHUB_STEP_SUMMARY")
        fi
        set +e
        node "$GITHUB_ACTION_PATH/bin/agentlens.js" "${args[@]}" > "$report_json"
        exit_code=$?
        set -e
        cat "$report_json"
        node - "$report_json" <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("node:fs");
        const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
        const status = report.failed === 0 && report.total > 0 ? "PASS" : "FAIL";
        console.log(`status=${status}`);
        console.log(`total=${report.total}`);
        console.log(`passed=${report.passed}`);
        console.log(`failed=${report.failed}`);
        NODE
        exit "$exit_code"
